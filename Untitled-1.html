<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>VR Interior Planner</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>

<body>
  <a-scene>

    <!-- SKY -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- LIGHTING -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" position="0 10 5" intensity="0.8"></a-light>


    <!-- FLOOR -->
    <a-plane rotation="-90 0 0" width="10" height="10" color="#d9d9d9">
    </a-plane>

    <!-- BACK WALL -->
    <a-box position="0 2 -5" width="10" height="4" depth="0.2" color="#ffffff">
    </a-box>

    <!-- LEFT WALL -->
    <a-box position="-5 2 0" width="0.2" height="4" depth="10" color="#f2f2f2">
    </a-box>

    <!-- RIGHT WALL -->
    <a-box position="5 2 0" width="0.2" height="4" depth="10" color="#f2f2f2">
    </a-box>

    <!-- CEILING -->
    <a-plane position="0 4 0" rotation="90 0 0" width="10" height="10" color="#eeeeee">
    </a-plane>

    <!-- SOFA -->
    <a-box position="-2 0.5 -2" width="2" height="1" depth="1" color="#4CC3D9">
    </a-box>

    <!-- TABLE -->
    <a-box position="2 0.5 -1" width="1.5" height="1" depth="1" color="#8B4513">
    </a-box>

    <!-- BED -->
    <a-box position="0 0.5 2" width="2" height="1" depth="3" color="#FFB6C1">
    </a-box>
    <!-- FLOOR -->
    <a-plane rotation="-90 0 0" width="10" height="10" color="#d9d9d9">
    </a-plane>

    <!-- BACK WALL -->
    <a-box position="0 6 -5" width="10" height="4" depth="0.2" color="#ffffff">
    </a-box>

    <!-- LEFT WALL -->
    <a-box position="-5 6 0" width="0.2" height="4" depth="10" color="#f2f2f2">
    </a-box>

    <!-- RIGHT WALL -->
    <a-box position="5 6 0" width="0.2" height="4" depth="10" color="#f2f2f2">
    </a-box>

    <!-- CEILING -->
    <a-plane position="0 8 0" rotation="90 0 0" width="10" height="10" color="#eeeeee">
    </a-plane>

    <!-- SOFA -->
    <a-box position="-2 4.5 -2" width="2" height="1" depth="1" color="#4CC3D9">
    </a-box>

    <!-- TABLE -->
    <a-box position="2 4.5 -1" width="1.5" height="1" depth="1" color="#8B4513">
    </a-box>

    <!-- BED -->
    <a-box position="0 4.5 2" width="2" height="1" depth="3" color="#FFB6C1">
    </a-box>
    <!--FRONT WALL-->
    <a-plane position="0 4 5" width="10" height="8" depth="0.2" color="#ffffff">
    </a-plane>

    <!-- CAMERA WITH MOVEMENT -->
    <a-entity position="0 1.6 4">
      <a-camera wasd-controls look-controls></a-camera>
    </a-entity>


  </a-scene>
</body>

</html>
